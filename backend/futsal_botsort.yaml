# BoT-SORT config for futsal with ReID (appearance-based re-identification)
# ReID prevents ID swaps when players cross paths or get occluded

tracker_type: botsort
track_high_thresh: 0.25
track_low_thresh: 0.10
new_track_thresh: 0.50
track_buffer: 150              # 5s at 30fps — keep lost tracks alive when players leave/return
match_thresh: 0.80
fuse_score: True

# BoT-SORT specific
gmc_method: none               # Static camera — GMC disabled (adds noise on fixed cam)
proximity_thresh: 0.5
appearance_thresh: 0.30        # ReID matching threshold (lower = stricter)
with_reid: True                # ENABLED — uses appearance model to maintain IDs through crossings
